<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Device Test</title>
    <style>
        .device-item { padding: 10px; border: 1px solid #ccc; margin: 5px; }
        .device-name { font-weight: bold; }
    </style>
</head>
<body>
    <h1>Device List Test</h1>
    <div id="deviceList">Loading...</div>
    <script>
        console.log('Test script started');
        
        async function test() {
            try {
                const response = await fetch('/api/homes/179001207323/devices');
                const data = await response.json();
                console.log('Data received:', data);
                
                const container = document.getElementById('deviceList');
                container.innerHTML = '';
                
                if (!data.devices || data.devices.length === 0) {
                    container.innerHTML = '<p>No devices</p>';
                    return;
                }
                
                data.devices.forEach(device => {
                    const div = document.createElement('div');
                    div.className = 'device-item';
                    div.innerHTML = `<div class="device-name">${device.name}</div><div>${device.model}</div>`;
                    container.appendChild(div);
                });
                
                console.log('Devices rendered:', data.devices.length);
            } catch (e) {
                console.error('Error:', e);
                document.getElementById('deviceList').innerHTML = '<p>Error: ' + e.message + '</p>';
            }
        }
        
        test();
    </script>
</body>
</html>
